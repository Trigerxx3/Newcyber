services:
  # Flask Backend
  - type: web
    name: narcotics-intel-backend
    env: python
    region: oregon
    plan: free
    branch: master
    buildCommand: "cd flask_backend && pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:${PORT:-10000} --workers 1 --timeout 300"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_4fHz5eSvQXND@ep-tiny-morning-a41u62xn-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
      - key: PYTHON_VERSION
        value: 3.12.7

  # Database: Using Neon PostgreSQL (external) - see DATABASE_URL env var above
